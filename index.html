<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Serwis | Oferowanie Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e30613;
            --primary-dark: #b01f15;
            --bg-dark: #0f172a;
            --sidebar-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --nav-width: 280px;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        /* Background Decoration */
        .bg-glow {
            position: fixed;
            top: -10%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(227, 6, 19, 0.15) 0%, transparent 70%);
            filter: blur(80px);
            z-index: -1;
        }

        /* Sidebar */
        .sidebar {
            width: var(--nav-width);
            background-color: var(--sidebar-bg);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--glass-border);
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-header {
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), #ff4d4d);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(227, 6, 19, 0.4);
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to bottom, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-subtext {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .nav-menu {
            flex-grow: 1;
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item {
            padding: 16px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            border-radius: 12px;
            transition: all 0.25s ease;
            color: var(--text-dim);
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .nav-item:hover {
            background-color: var(--glass);
            color: var(--text-main);
            transform: translateX(5px);
        }

        .nav-item.active {
            background: linear-gradient(90deg, rgba(227, 6, 19, 0.1) 0%, transparent 100%);
            color: var(--text-main);
            font-weight: 600;
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 20%;
            height: 60%;
            width: 4px;
            background: var(--primary);
            border-radius: 0 4px 4px 0;
            box-shadow: 0 0 10px var(--primary);
        }

        .nav-item span.icon {
            font-size: 1.2rem;
            opacity: 0.7;
        }

        .nav-item.active span.icon {
            opacity: 1;
            color: var(--primary);
        }

        .sidebar-footer {
            padding: 30px;
            border-top: 1px solid var(--glass-border);
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        /* Main Content */
        .main-container {
            margin-left: var(--nav-width);
            height: 100vh;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        .app-frame {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            width: calc(100% - 40px);
            height: calc(100% - 40px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: none;
            background: #fff; /* Keep white for the actual documents */
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            animation: frameEnter 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes frameEnter {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .app-frame.active {
            display: block;
        }

        .status-bar {
            position: fixed;
            bottom: 30px;
            right: 40px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            font-size: 0.7rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 200;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="logo-container">
            <div class="logo-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5"></path><path d="M2 12l10 5 10-5"></path></svg>
            </div>
            <div class="logo-text">SYSTEM SERWIS</div>
        </div>
        <div class="logo-subtext">Portfolio Generator</div>
    </div>
    
    <div class="nav-menu">
        <div class="nav-item active" onclick="switchApp(0, this)">
            <span class="icon">🧮</span>
            <span>Kalkulator Ceny</span>
        </div>
        <div class="nav-item" onclick="switchApp(1, this)">
            <span class="icon">📋</span>
            <span>Kreator Zakresów</span>
        </div>
        <div class="nav-item" onclick="switchApp(2, this)">
            <span class="icon">📄</span>
            <span>Edytor Oferty Finalnej</span>
        </div>
    </div>

    <div class="sidebar-footer">
        <div>© 2026 System Serwis Sp. z o.o.</div>
        <div style="margin-top: 5px; opacity: 0.6; font-size: 0.7rem;">System Ofertowania v1.1.0</div>
    </div>
</div>

<div class="main-container">
    <iframe id="app-0" class="app-frame active" src="src/calculator.html"></iframe>
    <iframe id="app-1" class="app-frame" src="src/scope.html"></iframe>
    <iframe id="app-2" class="app-frame" src="src/offer.html"></iframe>

    <div class="status-bar">
        <div style="display: flex; align-items: center; gap: 8px;">
            <div class="status-dot"></div>
            <span>Tryb: Administrator</span>
        </div>
        <div style="width: 1px; height: 12px; background: var(--glass-border);"></div>
        <span>Zasoby: Lokalne OK</span>
    </div>
</div>

<script>
    function switchApp(index, element) {
        const frames = document.querySelectorAll('.app-frame');
        frames.forEach(f => f.classList.remove('active'));
        
        const items = document.querySelectorAll('.nav-item');
        items.forEach(i => i.classList.remove('active'));
        
        const targetFrame = document.getElementById('app-' + index);
        targetFrame.classList.add('active');
        element.classList.add('active');

        // Optional: Trigger a sync when switching to offer
        if (index === 2) {
            window.forceRefreshAll();
        }
    }

    window.forceRefreshAll = function() {
        console.log("Dashboard: Synchronizacja danych...");
        
        // Sync Calculator
        const frameCena = document.getElementById('app-0');
        if (frameCena && frameCena.contentWindow && frameCena.contentWindow.loadData) {
            frameCena.contentWindow.loadData();
        }

        // Sync Offer
        const frameOferta = document.getElementById('app-2');
        if (frameOferta && frameOferta.contentWindow && frameOferta.contentWindow.syncData) {
            frameOferta.contentWindow.syncData();
        }
    };
</script>
</body>
</html>
