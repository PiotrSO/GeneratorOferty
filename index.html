<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Serwis | Oferowanie Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e30613;
            --primary-dark: #b01f15;
            --bg-dark: #0f172a;
            --sidebar-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --nav-width: 280px;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        /* Background Decoration */
        .bg-glow {
            position: fixed;
            top: -10%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(227, 6, 19, 0.15) 0%, transparent 70%);
            filter: blur(80px);
            z-index: -1;
        }

        /* Sidebar */
        .sidebar {
            width: var(--nav-width);
            background-color: var(--sidebar-bg);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--glass-border);
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-header {
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), #ff4d4d);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(227, 6, 19, 0.4);
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to bottom, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-subtext {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .nav-menu {
            flex-grow: 1;
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item {
            padding: 16px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            border-radius: 12px;
            transition: all 0.25s ease;
            color: var(--text-dim);
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .nav-item:hover {
            background-color: var(--glass);
            color: var(--text-main);
            transform: translateX(5px);
        }

        .nav-item.active {
            background: linear-gradient(90deg, rgba(227, 6, 19, 0.1) 0%, transparent 100%);
            color: var(--text-main);
            font-weight: 600;
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 20%;
            height: 60%;
            width: 4px;
            background: var(--primary);
            border-radius: 0 4px 4px 0;
            box-shadow: 0 0 10px var(--primary);
        }

        .nav-item span.icon {
            font-size: 1.2rem;
            opacity: 0.7;
        }

        .nav-item.active span.icon {
            opacity: 1;
            color: var(--primary);
        }

        .sidebar-footer {
            padding: 30px;
            border-top: 1px solid var(--glass-border);
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        /* Main Content */
        .main-container {
            margin-left: var(--nav-width);
            height: 100vh;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        .app-frame {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            width: calc(100% - 40px);
            height: calc(100% - 40px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: none;
            background: #fff; /* Keep white for the actual documents */
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            animation: frameEnter 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes frameEnter {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .app-frame.active {
            display: block;
        }

        .status-bar {
            position: fixed;
            bottom: 30px;
            right: 40px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            font-size: 0.7rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 200;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
        }

        .btn-project-save {
            padding: 12px 20px;
            font-family: inherit;
            background: linear-gradient(135deg, var(--primary), #ff4d4d);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(227, 6, 19, 0.2);
            transition: all 0.2s ease;
            width: 100%;
        }
        .btn-project-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(227, 6, 19, 0.3);
            filter: brightness(1.1);
        }
        
        .btn-project-load {
            padding: 12px 20px;
            font-family: inherit;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            width: 100%;
        }
        .btn-project-load:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="logo-container">
            <div class="logo-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5"></path><path d="M2 12l10 5 10-5"></path></svg>
            </div>
            <div class="logo-text">SYSTEM SERWIS</div>
        </div>
        <div class="logo-subtext">Portfolio Generator</div>
    </div>
    
    <div class="nav-menu">
        <div class="nav-item active" onclick="switchApp(0, this)">
            <span class="icon">🧮</span>
            <span>Kalkulator Ceny</span>
        </div>
        <div class="nav-item" onclick="switchApp(1, this)">
            <span class="icon">📋</span>
            <span>Kreator Zakresów</span>
        </div>
        <div class="nav-item" onclick="switchApp(2, this)">
            <span class="icon">📄</span>
            <span>Edytor Oferty Finalnej</span>
        </div>
        <div class="nav-item" onclick="switchApp(3, this)">
            <span class="icon">⚙️</span>
            <span>Ustawienia Admina</span>
        </div>
    </div>

    <div style="padding: 0 25px; margin: 15px 0 10px 0; border-top: 1px solid var(--glass-border); opacity: 0.5;"></div>
    <div style="padding: 0 25px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-weight: 700; margin-bottom: 10px;">Projekt</div>
    
    <div style="display: flex; flex-direction: column; gap: 8px; padding: 0 15px; margin-bottom: 20px;">
        <button onclick="saveProjectData()" class="btn-project-save">
            <span>💾</span> Zapisz Projekt
        </button>
        <button onclick="loadProjectData()" class="btn-project-load">
            <span>📂</span> Wczytaj Projekt
        </button>
        <button onclick="resetAllToDefault()" class="btn-project-load" style="margin-top: 8px; background: rgba(227, 6, 19, 0.05); border-color: rgba(227, 6, 19, 0.2); color: #ff4d4d;">
            <span>🔄</span> Przywróć Domyślne
        </button>
    </div>

    <div class="sidebar-footer">
        <div>© 2026 System Serwis Sp. z o.o.</div>
        <div style="margin-top: 5px; opacity: 0.6; font-size: 0.7rem;">System Ofertowania v1.1.0</div>
    </div>
</div>

<div class="main-container">
    <iframe id="app-0" class="app-frame active" src="src/calculator.html"></iframe>
    <iframe id="app-1" class="app-frame" src="src/scope.html"></iframe>
    <iframe id="app-2" class="app-frame" src="src/offer.html"></iframe>
    <iframe id="app-3" class="app-frame" src="src/admin.html"></iframe>

    <div class="status-bar">
        <div style="display: flex; align-items: center; gap: 8px;">
            <div class="status-dot"></div>
            <span>Tryb: Administrator</span>
        </div>
        <div style="width: 1px; height: 12px; background: var(--glass-border);"></div>
        <span>Zasoby: Lokalne OK</span>
    </div>
</div>

<script>
    window.showToast = function(message, type = 'success') {
        const toast = document.createElement('div');
        toast.style.position = 'fixed';
        toast.style.bottom = '80px';
        toast.style.right = '40px';
        toast.style.background = type === 'success' ? '#22c55e' : '#ef4444';
        toast.style.color = 'white';
        toast.style.padding = '12px 24px';
        toast.style.borderRadius = '10px';
        toast.style.boxShadow = '0 10px 25px rgba(0,0,0,0.3)';
        toast.style.zIndex = '99999';
        toast.style.fontFamily = "'Outfit', sans-serif";
        toast.style.fontSize = '0.9rem';
        toast.style.fontWeight = '600';
        toast.style.transition = 'all 0.3s ease';
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(20px)';
        
        document.body.appendChild(toast);
        toast.innerText = message;
        
        // Animacja wejścia
        setTimeout(() => {
            toast.style.opacity = '1';
            toast.style.transform = 'translateY(0)';
        }, 10);
        
        // Automatyczne ukrycie po 3 sekundach
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateY(20px)';
            setTimeout(() => {
                toast.remove();
            }, 300);
        }, 3000);
    };

    function switchApp(index, element) {
        const frames = document.querySelectorAll('.app-frame');
        frames.forEach(f => f.classList.remove('active'));
        
        const items = document.querySelectorAll('.nav-item');
        items.forEach(i => i.classList.remove('active'));
        
        const targetFrame = document.getElementById('app-' + index);
        targetFrame.classList.add('active');
        element.classList.add('active');

        // Wymuś focus na aktywnej ramce, aby umożliwić natychmiastowe pisanie w Electronie
        try {
            targetFrame.contentWindow.focus();
        } catch (e) {}

        // Optional: Trigger a sync when switching to offer
        if (index === 2) {
            window.forceRefreshAll();
        }
    }

    window.forceRefreshAll = function(excludeSource) {
        console.log("Dashboard: Synchronizacja danych (źródło: " + excludeSource + ")...");
        
        if (excludeSource && window.electronAPI) {
            window.electronAPI.setDirty(true);
        }
        
        const frameCena = document.getElementById('app-0');
        const frameScope = document.getElementById('app-1');
        const frameOferta = document.getElementById('app-2');
        const frameAdmin = document.getElementById('app-3');

        // Określenie co wymaga synchronizacji na podstawie źródła zmiany
        let syncCena = false;
        let syncScope = false;
        let syncOferta = false;
        let syncAdmin = false;

        if (!excludeSource) {
            // Pełna synchronizacja (np. wczytanie projektu)
            syncCena = true;
            syncScope = true;
            syncOferta = true;
            syncAdmin = true;
        } else if (excludeSource === 'scope') {
            // Zmiany w zakresie prac wpływają tylko na ofertę końcową
            syncOferta = true;
        } else if (excludeSource === 'calculator') {
            // Zmiany w kalkulatorze wpływają tylko na ofertę końcową
            syncOferta = true;
        } else if (excludeSource === 'offer') {
            // Zmiany w ofercie (nadpisania w panelu bocznym) wpływają na kalkulator
            syncCena = true;
        } else if (excludeSource === 'admin') {
            // Zmiany w ustawieniach admina wpływają na stawkę w kalkulatorze i końcową ofertę
            syncCena = true;
            syncOferta = true;
        }

        // Wykonaj rzeczywistą synchronizację dla wybranych ramek
        if (syncCena && frameCena && frameCena.contentWindow && frameCena.contentWindow.loadData) {
            frameCena.contentWindow.loadData();
        }
        if (syncScope && frameScope && frameScope.contentWindow && frameScope.contentWindow.refreshTasks) {
            frameScope.contentWindow.refreshTasks();
        }
        if (syncOferta && frameOferta && frameOferta.contentWindow && frameOferta.contentWindow.syncData) {
            frameOferta.contentWindow.syncData();
        }
        if (syncAdmin && frameAdmin && frameAdmin.contentWindow && frameAdmin.contentWindow.loadAdminConfig) {
            frameAdmin.contentWindow.loadAdminConfig();
        }
    };

    function getProjectState() {
        return {
            calculator: localStorage.getItem('kalkulator_v3_1'),
            tasks: localStorage.getItem('current_tasks_data'),
            tasksDay: localStorage.getItem('current_tasks_data_day'),
            offerSidebar: localStorage.getItem('oferta_sidebar_state'),
            images: localStorage.getItem('oferta_images_state'),
            adminConfig: localStorage.getItem('admin_system_config')
        };
    }

    window.saveProjectData = async function() {
        console.log("Dashboard: Przygotowanie zapisu projektu...");
        const state = getProjectState();
        const jsonString = JSON.stringify(state, null, 2);
        
        if (window.electronAPI) {
            const result = await window.electronAPI.saveProject(jsonString);
            if (result.success) {
                console.log("Dashboard: Projekt zapisany do " + result.filePath);
                window.electronAPI.setDirty(false);
            }
            // Przywróć focus na aktywną ramkę po zamknięciu okna dialogowego zapisu
            const activeFrame = document.querySelector('.app-frame.active');
            if (activeFrame) {
                try { activeFrame.contentWindow.focus(); } catch (e) {}
            }
            return result.success;
        } else {
            const blob = new Blob([jsonString], { type: 'application/json' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'projekt-oferty.ssproj';
            link.click();
            return true;
        }
    };
 
    window.loadProjectData = async function() {
        console.log("Dashboard: Rozpoczęcie wczytywania projektu...");
        if (window.electronAPI) {
            const result = await window.electronAPI.loadProject();
            if (result.success && result.content) {
                try {
                    const state = JSON.parse(result.content);
                    applyProjectState(state);
                    showToast("Projekt został wczytany pomyślnie!", "success");
                    window.electronAPI.setDirty(false);
                } catch (e) {
                    showToast("Błąd wczytywania pliku projektu: " + e.message, "error");
                }
            }
        } else {
            showToast("Funkcja wczytywania projektu jest dostępna w wersji desktopowej.", "error");
        }
    };

    function applyProjectState(state) {
        if (!state) return;
        if (state.calculator) localStorage.setItem('kalkulator_v3_1', state.calculator);
        if (state.tasks) localStorage.setItem('current_tasks_data', state.tasks);
        if (state.tasksDay) localStorage.setItem('current_tasks_data_day', state.tasksDay);
        if (state.offerSidebar) localStorage.setItem('oferta_sidebar_state', state.offerSidebar);
        if (state.images) localStorage.setItem('oferta_images_state', state.images);
        if (state.adminConfig) localStorage.setItem('admin_system_config', state.adminConfig);
        
        window.forceRefreshAll();
    }

    window.resetAllToDefault = function() {
        if (confirm("Czy na pewno chcesz przywrócić domyślne wartości dla całej aplikacji? Wszystkie bieżące dane (kalkulator, zakresy prac i ustawienia admina) zostaną nadpisane wartościami domyślnymi.")) {
            localStorage.removeItem('kalkulator_v3_1');
            localStorage.removeItem('current_tasks_data');
            localStorage.removeItem('current_tasks_data_day');
            localStorage.removeItem('oferta_sidebar_state');
            localStorage.removeItem('oferta_images_state');
            localStorage.removeItem('admin_system_config');
            
            window.forceRefreshAll();
            showToast("Przywrócono domyślne wartości dla całej aplikacji!", "success");
        }
    };

    if (window.electronAPI) {
        window.electronAPI.onTriggerSaveOnClose(async () => {
            const success = await window.saveProjectData();
            if (success) {
                window.electronAPI.closeAppForced();
            }
        });
    }
</script>
</body>
</html>
