<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sprzątania - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/calculator.css">
</head>
<body>

<div id="app-container">
    <div class="card header-section">
        <div class="form-group">
            <label>NAZWA KLIENTA</label>
            <input type="text" id="clientName" placeholder="np. Biuro Green Park" oninput="saveData()">
        </div>
        <div class="form-group">
            <label>ADRES KLIENTA</label>
            <input type="text" id="clientAddress" placeholder="ul. Przykładowa 1, 00-000 Miasto" oninput="saveData()">
        </div>
        <div class="form-group">
            <label>ADRES OBIEKTU</label>
            <input type="text" id="objectAddress" placeholder="ul. Obiektowa 2, 00-000 Miasto" oninput="saveData()">
        </div>
        <div class="form-group">
            <label>Data Kalkulacji</label>
            <input type="date" id="calcDate" onchange="saveData()">
        </div>
    </div>

    <div class="card">
        <h2>Parametry Obiektu</h2>
        <div class="input-grid">
            <div class="input-item"><label>Pow. biura [m²]</label><input type="number" id="officeArea" step="0.1" oninput="saveData()"></div>
            <div class="input-item"><label>Ilość pięter</label><input type="number" id="floors" value="1" oninput="saveData()"></div>
            <div class="input-item"><label>Stanowiska pracy</label><input type="number" id="workstations" oninput="saveData()"></div>
            <div class="input-item"><label>Sale konf.</label><input type="number" id="confRooms" oninput="saveData()"></div>
            <div class="input-item"><label>Pow. podłóg twardych [m²]</label><input type="number" id="hardFloors" step="0.1" oninput="saveData()"></div>
            <div class="input-item"><label>Kuchnie</label><input type="number" id="kitchens" oninput="saveData()"></div>
            <div class="input-item"><label>Zmywarki</label><input type="number" id="dishwashers" oninput="saveData()"></div>
            <div class="input-item"><label>Lodówki</label><input type="number" id="fridges" oninput="saveData()"></div>
            <div class="input-item"><label>Łazienki</label><input type="number" id="bathrooms" oninput="saveData()"></div>
            <div class="input-item"><label>Kabiny prysznic.</label><input type="number" id="showers" oninput="saveData()"></div>
            <div class="input-item"><label>Odkurzanie [dni/tydz]</label><input type="number" id="vacFreq" oninput="saveData()"></div>
            <div class="input-item"><label>Stanowiska [dni/tydz]</label><input type="number" id="workFreq" oninput="saveData()"></div>
        </div>
        <div style="margin-top: 25px;">
            <button class="btn-calc" onclick="calculateTime()">
                <span>⚡</span> Przelicz czas i wstaw do tabeli
            </button>
            <div id="cleaningTimeResult"></div>
        </div>
    </div>

    <div class="card" style="overflow-x: auto;">
        <h2>Kalkulacja Kosztów</h2>
        <table class="variants-table" id="variantsTable">
            <thead>
                <tr>
                    <th width="50">LP</th>
                    <th style="text-align: left;">Nazwa parametru</th>
                    <th>Wariant 0</th>
                    <th>Wariant 1</th>
                    <th>Wariant 2</th>
                    <th>Serwis Dzienny</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div style="font-weight: bold; margin-bottom: 8px; font-size: 11pt; margin-top: 20px;">Podsumowanie zaakceptowanych parametrów oferty</div>
    <table class="param-summary-table" style="width: 100%; border-collapse: collapse; margin-bottom: 25px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #cbd5e1;">
        <thead>
            <tr style="background: #f8fafc; border-bottom: 2px solid #e2e8f0;">
                <th width="30%" style="padding: 12px; text-align: left; font-weight: 700; color: #475569; font-size: 9pt; border: 1px solid #cbd5e1;"></th>
                <th width="18%" style="padding: 12px; text-align: center; font-weight: 700; color: #475569; font-size: 9pt; border: 1px solid #cbd5e1;">DNI W TYGODNIU</th>
                <th width="12%" style="padding: 12px; text-align: center; font-weight: 700; color: #475569; font-size: 9pt; border: 1px solid #cbd5e1;">RBH</th>
                <th width="20%" style="padding: 12px; text-align: center; font-weight: 700; color: #475569; font-size: 9pt; border: 1px solid #cbd5e1;">GODZINY OD-DO</th>
                <th width="20%" style="padding: 12px; text-align: center; font-weight: 700; color: #475569; font-size: 9pt; border: 1px solid #cbd5e1;">Cena miesięczna</th>
            </tr>
        </thead>
        <tbody>
            <tr id="row-summary-eve">
                <td style="padding: 12px; font-weight: bold; color: #1e293b; border: 1px solid #cbd5e1;">Serwis Wieczorny</td>
                <td id="oEveFreq" contenteditable="true" style="padding: 12px; text-align: center; border: 1px solid #cbd5e1; color: #334155;">-</td>
                <td id="oEveRbh" contenteditable="true" style="padding: 12px; text-align: center; border: 1px solid #cbd5e1; color: #334155;">-</td>
                <td id="oEveHours" contenteditable="true" style="padding: 12px; text-align: center; border: 1px solid #cbd5e1; color: #334155;">-</td>
                <td style="padding: 12px; text-align: center; font-weight: bold; border: 1px solid #cbd5e1; color: #0f172a;"><span id="oEvePriceVal" contenteditable="true">0,00</span> PLN</td>
            </tr>
            <tr id="row-summary-day">
                <td style="padding: 12px; font-weight: bold; color: #1e293b; border: 1px solid #cbd5e1;">Serwis Dzienny</td>
                <td id="oDayFreq" contenteditable="true" style="padding: 12px; text-align: center; border: 1px solid #cbd5e1; color: #334155;">-</td>
                <td id="oDayRbh" contenteditable="true" style="padding: 12px; text-align: center; border: 1px solid #cbd5e1; color: #334155;">-</td>
                <td id="oDayHours" contenteditable="true" style="padding: 12px; text-align: center; border: 1px solid #cbd5e1; color: #334155;">-</td>
                <td style="padding: 12px; text-align: center; font-weight: bold; border: 1px solid #cbd5e1; color: #0f172a;"><span id="oDayPriceVal" contenteditable="true">0,00</span> PLN</td>
            </tr>
            <tr style="background: #f8fafc; font-weight: bold;">
                <td colspan="4" style="padding: 14px; text-align: center; text-transform: uppercase; border: 1px solid #cbd5e1; color: #1e293b; font-size: 10pt;">REKOMENDOWANA CENA [NETTO/MIESIĄC]</td>
                <td style="padding: 14px; text-align: center; border: 1px solid #cbd5e1; background: #f1f5f9; vertical-align: middle;">
                    <div style="display: inline-flex; align-items: center; justify-content: center; gap: 4px;">
                        <input type="text" id="selectedPrice" value="0.00" readonly style="width: 100px; text-align: center; font-weight: 900; font-size: 13pt; border: none; background: transparent; color: #0284c7; padding: 0; outline: none;">
                        <span style="font-size: 11pt; color: #475569; font-weight: 700;">PLN</span>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="actions">
        <button class="btn-jpg" onclick="downloadAsImage()">
            <span>📷</span> Pobierz JPG
        </button>
    </div>
</div>

<script src="js/defaultData.js"></script>
<script src="js/appSync.js"></script>
<script src="js/calculator.js"></script>
</body>
</html>
