<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sprzątania - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --primary: #0056b3; 
            --accent: #198754;
            --bg-color: #f8fafc; 
            --border-color: #e2e8f0; 
            --white: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            padding: 40px 20px; 
            max-width: 1000px; 
            margin: 0 auto; 
            color: var(--text-dark);
        }

        .card {
            background: var(--white);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }

        h2 { 
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h2::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--primary);
            border-radius: 2px;
        }
        
        .header-section { 
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .form-group { 
            display: flex; 
            flex-direction: column; 
        }

        label { 
            font-weight: 600; 
            margin-bottom: 8px; 
            font-size: 0.8rem; 
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input { 
            padding: 10px 14px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            color: var(--text-dark);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        }

        .input-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 20px; 
        }

        .input-item { 
            display: flex; 
            flex-direction: column;
            gap: 5px;
        }

        .input-item input[type="number"] { 
            font-weight: 600;
        }

        table.variants-table { 
            width: 100%; 
            border-collapse: separate; 
            border-spacing: 0;
            margin-top: 10px; 
            font-size: 0.85rem; 
        }

        table.variants-table th, table.variants-table td { 
            padding: 12px; 
            text-align: center; 
            border-bottom: 1px solid var(--border-color);
        }

        table.variants-table th { 
            background-color: #f1f5f9; 
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.5px;
        }

        table.variants-table th:first-child { border-top-left-radius: 8px; }
        table.variants-table th:last-child { border-top-right-radius: 8px; }

        .variant-col input { 
            font-size: 1rem; 
            font-weight: 600; 
            width: 80px; 
            text-align: center; 
            border: 1px solid transparent;
            background: transparent;
            padding: 5px;
            border-radius: 4px;
        }

        .variant-col input:hover:not([readonly]) {
            border-color: var(--border-color);
            background: var(--bg-color);
        }

        .variant-col input:focus {
            border-color: var(--primary);
            background: var(--white);
        }

        tr[data-row="13"] { 
            background-color: #f0fdf4; 
            font-weight: 700;
            color: var(--accent);
        }

        tr[data-row="13"] input {
            color: var(--accent);
            font-size: 1.1rem;
        }
        
        #cleaningTimeResult { 
            background-color: #f0f9ff; 
            padding: 15px; 
            border-radius: 12px; 
            margin: 20px 0; 
            font-weight: 600; 
            text-align: center; 
            display: none; 
            color: #0369a1;
            border: 1px solid #bae6fd;
        }
        
        .summary-section { 
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            padding: 30px; 
            border-radius: 16px; 
            border: 2px solid #22c55e;
            margin-top: 30px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            gap: 10px; 
        }

        .summary-section label { 
            font-size: 0.85rem; 
            color: #166534; 
            margin: 0; 
            font-weight: 700;
        }

        .price-container {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }
        
        #selectedPrice { 
            font-size: 2.5rem; 
            font-weight: 800; 
            color: #15803d; 
            outline: none; 
            background: transparent;
            border: none;
            width: 300px;
            text-align: center;
            font-family: inherit;
        }

        .currency-label {
            font-size: 1.2rem;
            font-weight: 700;
            color: #15803d;
        }

        .actions { 
            display: flex; 
            gap: 15px; 
            justify-content: center; 
            margin-top: 40px; 
        }

        button { 
            padding: 12px 24px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 0.9rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-calc { 
            background-color: var(--primary); 
            color: white;
            width: 100%; 
            height: 50px;
            justify-content: center;
            font-size: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 86, 179, 0.3);
        }

        .btn-calc:hover { transform: translateY(-2px); box-shadow: 0 6px 10px -1px rgba(0, 86, 179, 0.4); }

        .btn-save { background-color: #0ea5e9; color: white; }
        .btn-jpg { background-color: #ef4444; color: white; }
        
        button:hover { filter: brightness(1.1); }

        .error-text { color: #ef4444; font-weight: 600; font-size: 0.75rem; }
    </style>
</head>
<body>

<div id="app-container">
    <div class="card header-section">
        <div class="form-group">
            <label>Nazwa Klienta / Rodzaj Serwisu</label>
            <input type="text" id="clientName" placeholder="np. Biuro Green Park" oninput="saveData()">
        </div>
        <div class="form-group">
            <label>Data Kalkulacji</label>
            <input type="date" id="calcDate" onchange="saveData()">
        </div>
    </div>

    <div class="card">
        <h2>Parametry Obiektu</h2>
        <div class="input-grid">
            <div class="input-item"><label>Pow. biura [m²]</label><input type="number" id="officeArea" step="0.1" oninput="saveData()"></div>
            <div class="input-item"><label>Ilość pięter</label><input type="number" id="floors" value="1" oninput="saveData()"></div>
            <div class="input-item"><label>Stanowiska pracy</label><input type="number" id="workstations" oninput="saveData()"></div>
            <div class="input-item"><label>Sale konf.</label><input type="number" id="confRooms" oninput="saveData()"></div>
            <div class="input-item"><label>Pow. podłóg twardych [m²]</label><input type="number" id="hardFloors" step="0.1" oninput="saveData()"></div>
            <div class="input-item"><label>Kuchnie</label><input type="number" id="kitchens" oninput="saveData()"></div>
            <div class="input-item"><label>Zmywarki</label><input type="number" id="dishwashers" oninput="saveData()"></div>
            <div class="input-item"><label>Lodówki</label><input type="number" id="fridges" oninput="saveData()"></div>
            <div class="input-item"><label>Łazienki</label><input type="number" id="bathrooms" oninput="saveData()"></div>
            <div class="input-item"><label>Kabiny prysznic.</label><input type="number" id="showers" oninput="saveData()"></div>
            <div class="input-item"><label>Odkurzanie [dni/tydz]</label><input type="number" id="vacFreq" oninput="saveData()"></div>
            <div class="input-item"><label>Stanowiska [dni/tydz]</label><input type="number" id="workFreq" oninput="saveData()"></div>
        </div>
        <div style="margin-top: 25px;">
            <button class="btn-calc" onclick="calculateTime()">
                <span>⚡</span> Przelicz czas i wstaw do tabeli
            </button>
            <div id="cleaningTimeResult"></div>
        </div>
    </div>

    <div class="card" style="overflow-x: auto;">
        <h2>Kalkulacja Kosztów</h2>
        <table class="variants-table" id="variantsTable">
            <thead>
                <tr>
                    <th width="50">LP</th>
                    <th style="text-align: left;">Nazwa parametru</th>
                    <th>Wariant 0</th>
                    <th>Wariant 1</th>
                    <th>Wariant 2</th>
                    <th>Wariant 3</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="summary-section">
        <label>REKOMENDOWANA CENA [NETTO / MIESIĄC]</label>
        <div class="price-container">
            <input type="text" id="selectedPrice" value="0.00" oninput="saveData()">
            <span class="currency-label">PLN</span>
        </div>
    </div>

    <div class="actions">
        <button class="btn-save" onclick="saveData(true)">
            <span>💾</span> Zapisz do Oferty
        </button>
        <button class="btn-jpg" onclick="downloadAsImage()">
            <span>📷</span> Pobierz JPG
        </button>
    </div>
</div>

<script>
    const rowDefinitions = [
        { id: 1, name: "Czas sprzątania 1x [h]", type: 'input' },
        { id: 2, name: "Ilość dni w tygodniu", type: 'input' },
        { id: 3, name: "Czas miesięczny [h]", type: 'calc' },
        { id: 4, name: "Stawka Prac. [PLN]", type: 'input' },
        { id: 5, name: "Stawka KP. [PLN]", type: 'auto' },
        { id: 6, name: "Koszty Prac. [PLN]", type: 'calc' },
        { id: 7, name: "Koszty KP. [PLN]", type: 'calc' },
        { id: 8, name: "Chemia [PLN]", type: 'calc' },
        { id: 9, name: "Amortyzacja [PLN]", type: 'calc' },
        { id: 10, name: "Suma Kosztów [PLN]", type: 'calc' },
        { id: 11, name: "Marża [%]", type: 'input' },
        { id: 12, name: "Marża [PLN]", type: 'calc' },
        { id: 13, name: "Cena Klient [PLN]", type: 'calc' }
    ];

    const salaryMap = { "22.50": 37.50, "23.81": 39.71, "25.00": 41.69, "30.00": 50.03, "35.00": 58.38, "40.00": 66.72 };

    document.addEventListener('DOMContentLoaded', () => {
        const dateInput = document.getElementById('calcDate');
        if (!dateInput.value) dateInput.valueAsDate = new Date();
        renderTable();
        loadData();
        document.getElementById('variantsTable').addEventListener('input', () => {
            recalcVariants();
            saveData();
        });
    });

    function renderTable() {
        const tbody = document.querySelector('#variantsTable tbody');
        tbody.innerHTML = '';
        rowDefinitions.forEach((row) => {
            const tr = document.createElement('tr');
            tr.setAttribute('data-row', row.id);
            tr.innerHTML = `<td>${row.id}.</td><td style="text-align:left">${row.name}</td>`;
            for (let i = 0; i < 4; i++) {
                tr.innerHTML += `<td class="variant-col"><input type="number" step="0.01" data-variant="${i}" data-row-id="${row.id}"
                ${row.type==='calc'?'readonly':''}></td>`; 
            }
            tbody.appendChild(tr);
        });
    }

    function calculateTime() {
        const getV = (id) => parseFloat(document.getElementById(id).value) || 0;
        const days = parseFloat(document.querySelector('input[data-row-id="2"][data-variant="0"]').value) || 1;
        
        let mins = 0;
        let vBase = (getV('officeArea')/100)*10, vF = getV('vacFreq');
        if(vF > 0 && vF < days) vBase -= ((days - vF) * vBase) / days;
        
        let wBase = getV('workstations')*2, wF = getV('workFreq');
        if(wF > 0 && wF < days) wBase -= ((days - wF) * wBase) / days;
        
        mins = vBase + wBase + getV('kitchens')*12 + getV('confRooms')*10 + getV('bathrooms')*10 + getV('showers')*10 + getV('dishwashers')*10 + (getV('hardFloors')/100)*20 + 10;
        
        let fM = getV('fridges')*20; 
        if(days > 1) fM /= days;
        mins += fM;
        
        if(getV('floors') > 1) mins += (getV('floors')-1)*10;
        
        const hrs = Math.round((mins/60)*100)/100;

        document.getElementById('cleaningTimeResult').style.display = 'block';
        document.getElementById('cleaningTimeResult').innerText = `Wyliczony czas: ${hrs} h (Wstawiono do Wariantu 0)`;
        document.querySelector('input[data-row-id="1"][data-variant="0"]').value = hrs;
        recalcVariants();
        saveData();
    }

    function recalcVariants() {
        for (let i = 0; i < 4; i++) {
            const g = (rid) => document.querySelector(`input[data-variant="${i}"][data-row-id="${rid}"]`);
            const val = (rid) => { const el = g(rid); return el && el.value ? parseFloat(el.value) : 0; };
            const set = (rid, v) => { const el = g(rid); if(el) el.value = v.toFixed(2); };
            const isEmpty = (rid) => { const el = g(rid); return !el || el.value.trim() === ""; };

            let st = val(1); 
            let d = val(2);  
            let mt = (st * d * 4.2);
            set(3, mt);
            
            let r4 = g(4) ? g(4).value : "0";
            let r4Val = parseFloat(r4);
            if(r4 && salaryMap[r4Val.toFixed(2)]) {
                g(5).value = salaryMap[r4Val.toFixed(2)].toFixed(2);
            } else if (r4Val > 0) {
                g(5).value = (r4Val * 1.6676).toFixed(2);
            }
            
            let n = val(4), kp = val(5);
            set(6, mt*n); set(7, mt*kp); set(8, mt*0.5); set(9, mt*0.7);
            let tc = val(7)+val(8)+val(9);
            set(10, tc);
            let mv = tc * (val(11)/100);
            set(12, mv);
            
            const finalPrice = tc + mv;
            const cell13Input = g(13);
            if (cell13Input) {
                const cell13 = cell13Input.parentElement;
                if ([1, 2, 4, 11].some(rid => isEmpty(rid))) {
                   cell13Input.style.display = 'none';
                   if (!cell13.querySelector('.error-text')) {
                      const span = document.createElement('span');
                      span.className = 'error-text'; span.innerText = 'DANE?';
                      cell13.appendChild(span);
                   }
                 } else {
                     const span = cell13.querySelector('.error-text');
                     if (span) span.remove();
                     cell13Input.style.display = 'inline-block';
                     set(13, finalPrice);
                 }
             }
         }
    }

    function downloadAsImage() {
        const container = document.getElementById('app-container');
        const actions = document.querySelector('.actions');
        actions.style.visibility = 'hidden';

        html2canvas(container, {
            scale: 2, 
            backgroundColor: "#f8fafc",
        }).then(canvas => {
            const link = document.createElement('a');
            const name = document.getElementById('clientName').value || 'Wycena';
            link.download = `${name}.jpg`;
            link.href = canvas.toDataURL("image/jpeg", 0.9);
            link.click();
            actions.style.visibility = 'visible';
        });
    }

    function saveData(showAlert = false) {
        const data = {};
        document.querySelectorAll('input').forEach(el => {
            const key = el.id || `v${el.dataset.variant}_r${el.dataset.rowId}`;
            data[key] = el.value;
        });
        data['selectedPrice'] = document.getElementById('selectedPrice').value;
        localStorage.setItem('kalkulator_v3_1', JSON.stringify(data));
        
        if (window.parent && window.parent.forceRefreshAll) {
            window.parent.forceRefreshAll();
        }
        if (showAlert) alert('Zapisano pomyślnie.');
    }

   function loadData() {
        const raw = localStorage.getItem('kalkulator_v3_1');
        if (!raw) return;
        try {
            const data = JSON.parse(raw);
            for (const [key, val] of Object.entries(data)) {
                if (key === 'selectedPrice') {
                    document.getElementById('selectedPrice').value = val;
                    continue;
                }
                const el = document.getElementById(key) || 
                           document.querySelector(`input[data-variant="${key.split('_r')[0].substring(1)}"][data-row-id="${key.split('_r')[1]}"]`);
                if (el) el.value = val;
            }
            recalcVariants();
        } catch (e) { console.error(e); }
    }
</script>
</body>
</html>
