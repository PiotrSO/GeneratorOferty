<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kreator Zakresów - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/scope.css">
</head>
<body>

    <div class="toolbar">
        <button class="btn-add" onclick="addTask()"><span>➕</span> Dodaj czynność (Prace)</button>
        <button class="btn-add" onclick="addTaskDay()"><span>➕</span> Dodaj czynność (Serwis Dzienny)</button>
        <button class="btn-save" onclick="manualSync()"><span>💾</span> Zapisz do Oferty</button>
        <button class="btn-load">
            <span>📂</span> Wczytaj kopię
            <input type="file" id="file-loader" accept=".json" onchange="loadData(this)">
        </button>
        <button class="btn-reset" onclick="resetToDefault()"><span>🔄</span> Resetuj (Prace)</button>
        <button class="btn-reset" onclick="resetToDefaultDay()"><span>🔄</span> Resetuj (Serwis Dzienny)</button>
        <button class="btn-jpg" onclick="generateJPG()"><span>📷</span> Pobierz JPG (Prace)</button>
        <button class="btn-jpg" onclick="generateJPGDay()"><span>📷</span> Pobierz JPG (Serwis Dzienny)</button>
    </div>

    <div class="main-wrapper" style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
        <!-- LEWY PANEL: DWA EDYTORY -->
        <div style="display: flex; flex-direction: column; gap: 30px;">
            <!-- EDYTOR 1: ZAKRESY PRAC PORZĄDKOWYCH -->
            <div class="card">
                <div class="card-title">1. Zakres Prac Porządkowych</div>
                <div id="editor-list"></div>
                <button class="btn-add" style="width:100%; margin-top:20px; justify-content: center;" onclick="addTask()">Dodaj czynność</button>
            </div>

            <!-- EDYTOR 2: ZAKRESY SERWISU DZIENNEGO -->
            <div class="card">
                <div class="card-title">2. Zakresy Czynności Serwisu Dziennego</div>
                <div id="editor-list-day"></div>
                <button class="btn-add" style="width:100%; margin-top:20px; justify-content: center;" onclick="addTaskDay()">Dodaj czynność</button>
            </div>
        </div>

        <!-- PRAWY PANEL: DWE TABELE PODGLĄDU -->
        <div class="preview-container" style="display: flex; flex-direction: column; gap: 30px;">
            <!-- TABELA 1: ZAKRESY PRAC -->
            <div id="canvas-target" class="preview-panel">
                <div class="offer-title">Wykaz czynności / prac porządkowych</div>
                <table class="offer-table">
                    <thead><tr id="preview-header-row"></tr></thead>
                    <tbody id="preview-body"></tbody>
                </table>
                <div id="empty-msg" class="empty-msg" style="display:none; text-align:center; padding:40px; color:#94a3b8; font-style:italic;">Brak zaznaczonych czynności.</div>
            </div>

            <!-- TABELA 2: ZAKRESY SERWISU DZIENNEGO -->
            <div id="canvas-target-day" class="preview-panel">
                <div class="offer-title">Wykaz Czynności Serwisu Dziennego</div>
                <table class="offer-table">
                    <thead><tr id="preview-header-row-day"></tr></thead>
                    <tbody id="preview-body-day"></tbody>
                </table>
                <div id="empty-msg-day" class="empty-msg" style="display:none; text-align:center; padding:40px; color:#94a3b8; font-style:italic;">Brak zaznaczonych czynności.</div>
            </div>
        </div>
    </div>

    <script src="js/defaultData.js"></script>
<script src="js/appSync.js"></script>
<script src="js/scope.js"></script>
</body>
</html>
