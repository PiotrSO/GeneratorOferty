<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kreator Zakresów - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/scope.css">
</head>
<body>

    <div class="toolbar">
        <button class="btn-add" onclick="addTask()"><span>➕</span> Dodaj czynność</button>
        <button class="btn-save" onclick="manualSync()"><span>💾</span> Zapisz do Oferty</button>
        <button class="btn-load">
            <span>📂</span> Wczytaj kopię
            <input type="file" id="file-loader" accept=".json" onchange="loadData(this)">
        </button>
        <button class="btn-reset" onclick="resetToDefault()"><span>🔄</span> Resetuj</button>
        <button class="btn-jpg" onclick="generateJPG()"><span>📷</span> Pobierz JPG</button>
    </div>

    <div class="main-wrapper">
        <div class="card">
            <div class="card-title">Edytor Czynności</div>
            <div id="editor-list"></div>
            <button class="btn-add" style="width:100%; margin-top:20px; justify-content: center;" onclick="addTask()">Dodaj kolejną pozycję</button>
        </div>

        <div class="preview-container">
            <div id="canvas-target">
                <div class="offer-title">Wykaz czynności / prac porządkowych</div>
                <table class="offer-table">
                    <thead><tr id="preview-header-row"></tr></thead>
                    <tbody id="preview-body"></tbody>
                </table>
                <div id="empty-msg" style="display:none; text-align:center; padding:40px; color:#94a3b8; font-style:italic;">Brak zaznaczonych czynności.</div>
            </div>
        </div>
    </div>

    <script src="js/defaultData.js"></script>
<script src="js/appSync.js"></script>
<script src="js/scope.js"></script>
</body>
</html>
